<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - StoryAnalyst AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css" />
    <style>
        .auth-container { max-width: 400px; margin: 4rem auto; padding: 2rem; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); }
        .auth-form { display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem; }
        .auth-input { width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; }
        .auth-btn { width: 100%; padding: 0.8rem; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .auth-error { color: #fca5a5; background: rgba(239, 68, 68, 0.15); padding: 0.8rem; border-radius: 5px; font-size: 0.9rem; text-align: center; }
        .auth-links { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
        .auth-links a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="header" style="padding: 1rem;">
        <div class="logo"><span class="logo-icon">⚡</span><span class="logo-text">StoryAnalyst <span class="logo-sub">AI</span></span></div>
    </div>
    <div class="auth-container">
        <h2 style="text-align: center;">Create Account</h2>
        {% if error %}
            <div class="auth-error">{{ error }}</div>
        {% endif %}
        <form class="auth-form" method="POST" action="/signup">
            <div>
                <label>Full Name</label>
                <input type="text" name="name" class="auth-input" required>
            </div>
            <div>
                <label>Email</label>
                <input type="email" name="email" class="auth-input" required>
            </div>
            <div>
                <label>Password</label>
                <input type="password" name="password" class="auth-input" required>
            </div>
            <button type="submit" class="auth-btn">Sign Up</button>
        </form>
        <div class="auth-links">
            Already have an account? <a href="/login">Login</a>
        </div>
    </div>
</body>
</html>
